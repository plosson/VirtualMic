name: Build & Notarize PKG

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Import Application certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/app.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/app.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/app.p12

      - name: Import Installer certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_INSTALLER_P12 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/installer.p12
          security import /tmp/installer.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/installer.p12

      - name: Build and package
        run: make pkg

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set +e
          xcrun notarytool submit build/VirtualMic-*.pkg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1 | tee /tmp/notarize.log
          RESULT=$?
          SUBMISSION_ID=$(grep -o '[0-9a-f\-]\{36\}' /tmp/notarize.log | head -1)
          # Check for Invalid status or non-zero exit
          if [ $RESULT -ne 0 ] || grep -q "status: Invalid" /tmp/notarize.log; then
            echo "::error::Notarization failed. Fetching log..."
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                /tmp/notarize-log.json 2>/dev/null
              cat /tmp/notarize-log.json 2>/dev/null || echo "Could not fetch log"
            fi
            exit 1
          fi
          xcrun stapler staple build/VirtualMic-*.pkg

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VirtualMic-pkg
          path: build/VirtualMic-*.pkg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/VirtualMic-*.pkg
