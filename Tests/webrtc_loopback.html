<!DOCTYPE html>
<html>
<head><title>VirtualMic WebRTC Test</title></head>
<body>
<pre id="log"></pre>
<script>
const ANALYSIS_DURATION_MS = 3000;
const EXPECTED_FREQ = 440;
const FFT_SIZE = 8192;

function log(msg) {
  document.getElementById('log').textContent += msg + '\n';
  console.log(msg);
}

async function findVirtualMic() {
  const devices = await navigator.mediaDevices.enumerateDevices();
  const mics = devices.filter(d => d.kind === 'audioinput');
  log('Available mics: ' + mics.map(d => d.label).join(', '));
  const vm = mics.find(d => d.label.toLowerCase().includes('virtualmic'));
  if (!vm) throw new Error('VirtualMic not found. Available: ' + mics.map(d => d.label).join(', '));
  log('Selected: ' + vm.label);
  return vm.deviceId;
}

function analyzeStream(stream, label) {
  return new Promise(async (resolve) => {
    const ctx = new AudioContext({ sampleRate: 48000 });
    await ctx.resume();

    const source = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    source.connect(analyser);
    const silentGain = ctx.createGain();
    silentGain.gain.value = 0;
    analyser.connect(silentGain);
    silentGain.connect(ctx.destination);

    const binWidth = ctx.sampleRate / FFT_SIZE;
    const rmsValues = [];
    const peakFreqs = [];
    const startTime = Date.now();

    function sample() {
      const timeDomain = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(timeDomain);

      let sumSq = 0;
      for (let i = 0; i < timeDomain.length; i++) sumSq += timeDomain[i] * timeDomain[i];
      const rms = Math.sqrt(sumSq / timeDomain.length);
      if (rms > 0.0001) rmsValues.push(rms);

      const freqData = new Float32Array(analyser.frequencyBinCount);
      analyser.getFloatFrequencyData(freqData);
      let maxVal = -Infinity, maxBin = 0;
      for (let i = 1; i < freqData.length; i++) {
        if (freqData[i] > maxVal) { maxVal = freqData[i]; maxBin = i; }
      }
      if (rms > 0.0001) peakFreqs.push(maxBin * binWidth);

      if (Date.now() - startTime < ANALYSIS_DURATION_MS) {
        requestAnimationFrame(sample);
      } else {
        ctx.close();
        const avgRms = rmsValues.length > 0 ? rmsValues.reduce((a,b) => a+b,0) / rmsValues.length : 0;
        const rmsDb = avgRms > 0 ? 20 * Math.log10(avgRms) : -100;
        const sorted = [...peakFreqs].sort((a,b) => a-b);
        const medianFreq = sorted.length > 0 ? sorted[Math.floor(sorted.length / 2)] : 0;
        resolve({ label, avgRms, rmsDb, medianFreq, nonZeroSamples: rmsValues.length });
      }
    }
    setTimeout(sample, 300);
  });
}

async function run() {
  try {
    log('--- VirtualMic Voice Processing Test ---');
    const deviceId = await findVirtualMic();

    // Test 1: Raw capture (no voice processing)
    log('\n[Test 1] Raw capture (no processing)...');
    const rawStream = await navigator.mediaDevices.getUserMedia({
      audio: { deviceId: { exact: deviceId },
               echoCancellation: false, noiseSuppression: false, autoGainControl: false },
      video: false
    });
    const rawResult = await analyzeStream(rawStream, 'raw');
    rawStream.getTracks().forEach(t => t.stop());

    // Test 2: With voice processing (what Meet/Zoom use)
    log('[Test 2] With voice processing (echoCancellation + noiseSuppression + AGC)...');
    const procStream = await navigator.mediaDevices.getUserMedia({
      audio: { deviceId: { exact: deviceId },
               echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      video: false
    });
    const procResult = await analyzeStream(procStream, 'processed');
    procStream.getTracks().forEach(t => t.stop());

    // Report
    log('\n=== RESULTS ===');
    for (const r of [rawResult, procResult]) {
      log(`[${r.label}] RMS: ${r.avgRms.toFixed(4)} (${r.rmsDb.toFixed(1)} dBFS) | Freq: ${r.medianFreq.toFixed(1)} Hz | Samples: ${r.nonZeroSamples}`);
    }

    const volumeDrop = rawResult.rmsDb - procResult.rmsDb;
    log(`\nVolume drop from processing: ${volumeDrop.toFixed(1)} dB`);

    const results = {
      raw: rawResult,
      processed: procResult,
      volumeDropDb: volumeDrop,
      rawSignalPresent: rawResult.avgRms > 0.01,
      processedSignalPresent: procResult.avgRms > 0.005,
      processedVolumeOk: procResult.rmsDb > -40,
      processedFreqOk: Math.abs(procResult.medianFreq - EXPECTED_FREQ) < 50,
    };
    results.pass = results.rawSignalPresent && results.processedSignalPresent &&
                   results.processedVolumeOk && results.processedFreqOk;

    log(results.pass ? '\nPASS' : '\nFAIL');
    console.log('TEST_RESULT:' + JSON.stringify(results));
  } catch (err) {
    log('ERROR: ' + err.message);
    console.log('TEST_RESULT:' + JSON.stringify({ pass: false, error: err.message }));
  }
}

run();
</script>
</body>
</html>
